name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4   # ✅ No dash, properly indented
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt
        pip install -e .
    
    - name: Run unit tests
      run: |
        pytest tests/unit/ -v --tb=short --cov=frameworm
    
    - name: Run integration tests
      run: |
        pytest tests/integration/ -v --tb=short
    
    - name: Upload coverage
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        fail_ci_if_error: true

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v4
    - name: Run linters
      run: |
        pip install black flake8 mypy isort
        black --check . --exclude "/(\.git|\.venv|__pycache__|\.egg-info|dist|build)/"
        flake8 . --max-line-length=100 --exclude ".git,__pycache__,.venv,.egg-info,dist,build" --ignore=F401,F811,E402,F841,F821,F541,E401,W503,E226,F403,F405,W391,E501,E203,E741,E722,E231,W605,F824
        isort --check-only . --profile black --skip-glob=".*" --skip ".venv,.git,__pycache__,.egg-info,dist,build"

  docs:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v4
    - name: Build docs
      run: |
        pip install -r requirements.txt
        pip install mkdocs mkdocs-material
        mkdocs build
